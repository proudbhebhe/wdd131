<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Proud Bhebhe">
    <meta name="description" content="A simple website that has a hamburger menu and is fit for any device.">
    <title>Temple Album</title>
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <header>
        <p class="new">Temple Album</p>
        <button id="menu" type="button" aria-label="Hamburger menu"></button>
        <nav>
            <ul id="happy" class="navigation">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Home</h1>
        <div class="build">
            <div><figure>
                <img src="images/nauvoo.jpg" alt="Nauvoo Illinois temple during the sunrise" loading="lazy" width="400" height="250">

            </figure></div>
            <div><figure>
                <img src="images/st.-george.jpg" alt="St George Temple front view" loading="lazy" width="400" height="250">

            </figure></div>
            <div><figure>
                <img src="images/johannesburg-south.jpg" alt="South Africa Temple" loading="lazy" width="400" height="250">

            </figure></div>
            <div><figure>
                <img src="images/durban-south.jpg" alt="Durban South Africa Temple" loading="lazy" width="400" height="250">

            </figure></div>
            <div><figure>
                <img src="images/rome-italy.jpg" alt="Rome Italy Temple in the morning" loading="lazy" width="400" height="250">

            </figure></div>

            </figure></div>
            <div><figure>
                <img src="images/elko-nevada.jpg" alt="Elko Nevada Temple in the evening" loading="lazy" width="400" height="250">

            </figure></div>
            <div><figure>

            </figure></div>
            <div><figure>
                <img src="images/aba-nigeria.jpg" alt="Aba Nigeria Temple" loading="lazy" width="400" height="250">
                <figcaption>Aba Nigeria Temple</figcaption>
            </figure></div>
        </div>

        
    </main>
    <footer>
        <p>&copy;<span id="currentyear"></span> | Proud Bhebhe | Zimbabwe</p>
  
        <p id="lastModified"></p>
